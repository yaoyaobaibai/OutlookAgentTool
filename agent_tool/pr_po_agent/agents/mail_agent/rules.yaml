# Mail Agent default rules
# Format: list of rules. Each rule has conditions (field-op-value) and actions.
# Supported operators: equals, not_equals, contains, not_contains,
#                     starts_with, ends_with, matches_regex
# Compound conditions: "all:" = AND, "any:" = OR
# List-valued fields (e.g. attachment_names): a string op matches if
# ANY element of the list satisfies it. Empty list = no match.

rules:
  - name: "PR_FORM_ATTACHED"
    enabled: true
    description: "Match internal emails with attachment name containing 'PR Form'"
    conditions:
      - all:
          - field: attachment_names
            op: contains
            value: "PR Form"
          - field: sender_email
            op: ends_with
            value: "@company.com"
    actions:
      - download_attachments
      - mark_as_processed

settings:
  poll_interval_seconds: 120
  inbox_root: "%USERPROFILE%/PRPOAgent/inbox"
  log_level: "INFO"
  log_file: "%USERPROFILE%/PRPOAgent/mail_agent.log"
